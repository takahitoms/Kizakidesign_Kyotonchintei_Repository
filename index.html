<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>鉄板居酒屋 京とんちん亭 みやこみち店｜席予約</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17418263639"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    /* ベースの Google 広告タグ */
    gtag('config', 'AW-17418263639');

    /* 電話番号スニペット（広告電話コンバージョン） */
    gtag('config', 'AW-17418263639/JzXHCN3q1oobENe41vFA', {
      'phone_conversion_number': '0756939911'
    });

    /* 経路検索（Googleマップ）コンバージョン */
    function gtag_report_route(url) {
      var callback = function () {
        if (typeof(url) !== 'undefined') {
          window.location = url;
        }
      };
      gtag('event', 'conversion', {
        'send_to': 'AW-17418263639/Byj5COD-pfwaENe41vFA',
        'event_callback': callback
      });
      return false;
    }

    /* 自社Web → ホットペッパー（OWST）遷移コンバージョン */
    function gtag_report_hotpepper(url) {
      var callback = function () {
        if (typeof(url) !== 'undefined') {
          window.location = url;
        }
      };
      gtag('event', 'conversion', {
        'send_to': 'AW-17418263639/DH8sCLCim4EcENe41vFA',
        'event_callback': callback
      });
      return false;
    }
  </script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont,
                   "Hiragino Kaku Gothic ProN",
                   "Yu Gothic", Meiryo, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #fff;
    }

    /* ヒーロー画像 */
    .hero {
      position: relative;
      background-image: url("restaurant.jpg");
      background-size: cover;
      background-position: center;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    .hero h1 {
      position: relative;
      color: #fff;
      font-size: 1.8rem;
      text-align: center;
      padding: 0 1rem;
    }

    .content {
      padding: 1.5rem;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .tel {
      font-size: 1.1rem;
      margin: 1.5rem 0;
    }

    .tel a {
      color: #c00;
      text-decoration: none;
      font-weight: bold;
    }

    /* ボタン共通 */
    .btn {
      display: inline-block;
      padding: 0.9rem 1.8rem;
      text-decoration: none;
      font-size: 1.05rem;
      border-radius: 6px;
      color: #fff;
      margin: 0.6rem 0;
    }

    .btn-reserve { background: #c00; }
    .btn-gallery { background: #666; }
    .btn-route   { background: #1a73e8; }

    .map {
      margin-top: 2.5rem;
    }

    iframe {
      width: 100%;
      height: 350px;
      border: 0;
    }
  </style>
</head>

<body>

  <!-- 店名＋背景画像 -->
  <div class="hero">
    <h1>鉄板居酒屋<br>京とんちん亭 みやこみち店</h1>
  </div>

  <div class="content">

    <!-- 電話番号（Webタップは通常遷移。広告電話はスニペットで計測） -->
    <div class="tel">
      📞 お電話でのご予約：<br>
      <a href="tel:0756939911">075-693-9911</a>
    </div>

    <!-- 予約ボタン：自社Web → ホットペッパー遷移CV -->
    <a
      href="https://www.hotpepper.jp/strJ000759092/yoyaku/hpds/?ROUTE_KBN=20"
      class="btn btn-reserve"
      target="_blank"
      rel="noopener"
      onclick="return gtag_report_hotpepper(this.href);"
    >
      ▶ 席を予約する
    </a><br>

    <!-- ギャラリーボタン（CVなし） -->
    <a
      href="https://akr6025958183.owst.jp/gallery"
      class="btn btn-gallery"
      target="_blank"
      rel="noopener"
    >
      ▶ 店内ギャラリーを見る
    </a><br>

    <!-- 経路検索ボタン：Googleマップ遷移CV -->
    <a
      href="https://www.google.com/maps?q=京とんちん亭みやこみち店"
      class="btn btn-route"
      target="_blank"
      rel="noopener"
      onclick="return gtag_report_route(this.href);"
    >
      ▶ 経路を検索する
    </a>

    <!-- 地図表示（表示のみ・CV対象外） -->
    <div class="map">
      <iframe
        src="https://www.google.com/maps?q=京とんちん亭みやこみち店&output=embed"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>

  </div>

</body>
</html>
